# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

# wallust-colors
#include kitty-colors.conf 

font_family Fira Code SemiBold
font_size 11.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.7
confirm_os_window_close 0

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 4

selection_foreground none
selection_background none

foreground #dddddd
background #000000
cursor #dddddd

# Fix keyboard layout switching - disable conflicting shortcuts
clear_all_shortcuts no
# Pass layout switching to system (Hyprland handles Alt+Shift)
kitty_mod ctrl+shift

map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+t new_tab
map ctrl+w close_tab
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9
map ctrl+0 goto_tab 10

tab_bar_style separator
tab_bar_min_tabs 2
tab_separator " | "
tab_title_template "{title}"
active_tab_foreground #dddddd
active_tab_background #000000
active_tab_font_style normal
inactive_tab_foreground #666666
inactive_tab_background #000000
inactive_tab_font_style normal
