# Better prefix (Ctrl+a instead of Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Easy splits (| and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resize (prefix + HJKL)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Mouse support
set -g mouse on

# Vi mode for copy
setw -g mode-keys vi

# Fast escape (important for nvim)
set -sg escape-time 0

# Bigger history
set -g history-limit 50000

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Reload config with prefix+r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar
set -g status-style 'bg=default,fg=white'
set -g status-left '#[fg=green,bold] #S '
set -g status-right '#[fg=white]%H:%M '
set -g window-status-current-format '#[fg=cyan,bold] #I:#W'
set -g window-status-format ' #[fg=gray]#I:#W'
